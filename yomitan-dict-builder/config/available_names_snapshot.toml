[build]
snapshot_version = "2026-04-09"
fail_on_policy_error = true
fail_on_no_enabled_sources = true
fail_on_missing_input = true

[image_policy]
mirror_locally = true
fetch_remote = false
image_store_subdir = "image_store"

[sources.vndb_dump]
kind = "vndb_dump"
enabled = true
input = "../data/input/vndb-db-2026-04-08.tar.zst"
format = "vndb_dump"
license_class = "vndb_odbl_dbcl"
license_label = "VNDB database dump"
license_url = "https://vndb.org/d17"
notes = "Reduced offline build using the locally available VNDB dump. Dump-only mode does not fetch remote image binaries."

[sources.kaggle_anilist_snapshot]
kind = "kaggle_anilist_snapshot"
enabled = true
input = "../data/input/anilist_anime_dataset.csv"
format = "csv"
license_class = "community_snapshot"
license_label = "AniList Kaggle snapshot"
license_url = "https://www.kaggle.com/datasets/calebmwelsh/anilist-anime-dataset"
notes = "Reduced offline build using the locally available AniList Kaggle export. Image URLs are preserved, but remote image bytes are not fetched."
