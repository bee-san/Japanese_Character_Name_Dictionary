[build]
snapshot_version = "2026-04-09"
fail_on_policy_error = true
fail_on_no_enabled_sources = true
fail_on_missing_input = true

[image_policy]
mirror_locally = false
fetch_remote = false
image_store_subdir = "image_store"

[sources.vndb_dump]
kind = "vndb_dump"
enabled = true
input = "../vndb_dump_archive"
format = "vndb_dump"
license_class = "vndb_fixture"
license_label = "VNDB Dump Fixture"
license_url = "https://example.invalid/vndb-dump-fixture"

[sources.kaggle_anilist_snapshot]
kind = "kaggle_anilist_snapshot"
enabled = true
input = "../anilist_kaggle_snapshot/anilist_kaggle_sample.csv"
format = "csv"
license_class = "anilist_fixture"
license_label = "AniList Kaggle Fixture"
license_url = "https://example.invalid/anilist-kaggle-fixture"

[sources.jmnedict]
kind = "jmnedict"
enabled = true
input = "../jmnedict_snapshot/JMnedict.xml"
format = "jmnedict"
license_class = "edrdg_fixture"
license_label = "JMnedict Fixture"
license_url = "https://www.edrdg.org/enamdict/enamdict_doc.html"

[sources.web_ndl_authorities]
kind = "web_ndl_authorities"
enabled = true
input = "../web_ndl_snapshot/web_ndl_authorities_sample.json"
format = "web_ndl_authorities"
license_class = "ndl_fixture"
license_label = "Web NDL Fixture"
license_url = "https://id.ndl.go.jp/information/sparql/"

[sources.wikidata_dump]
kind = "wikidata_dump"
enabled = true
input = "../wikidata_snapshot/wikidata_sample.jsonl"
format = "wikidata_dump"
license_class = "wikidata_fixture"
license_label = "Wikidata Fixture"
license_url = "https://www.wikidata.org/wiki/Wikidata:Database_download"

[sources.wikipedia_dump]
kind = "wikipedia_dump"
enabled = true
input = "../wikipedia_snapshot/wikipedia_sample.json"
format = "wikipedia_dump"
license_class = "wikipedia_fixture"
license_label = "Wikipedia Fixture"
license_url = "https://dumps.wikimedia.org/"
